<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体育课考勤与成绩管理系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2312/2312217.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2312/2312217.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --normal: #4CAF50;
            --leave: #FFC107;
            --absent: #F44336;
            --late: #FF9800;
            --early: #00BCD4;
            --bg: #f4f7f6;
            --accent: #2196F3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #2c3e50; margin-top: 5px; font-size: 20px; }
        h3 { margin-top: 5px; margin-bottom: 10px; font-size: 16px; }
        .section { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        
        .file-input-wrapper {
            border: 2px dashed #4CAF50;
            padding: 12px;
            text-align: center;
            background: #f1f8e9;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 5px;
            font-size: 13px;
            font-weight: bold;
            color: #2E7D32;
        }
        .file-input-wrapper input[type="file"] { display: none; }
        
        input[type="text"], input[type="date"], select {
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
        }
        button:active { opacity: 0.8; }
        
        /* 手风琴折叠样式 */
        .class-group { margin-bottom: 10px; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
        .class-header {
            background: #e9ecef;
            padding: 12px 15px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .class-header:hover { background: #dee2e6; }
        .class-header::after { content: '▼'; font-size: 11px; color: #666; transition: transform 0.2s; }
        .class-group.open .class-header::after { content: '▲'; }
        
        .class-content { display: none; padding: 0 10px 10px 10px; background: #fff; }
        .class-group.open .class-content { display: block; }

        /* 学生条目整行优化 */
        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
        }
        
        .student-info { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            flex-wrap: wrap; 
            flex: 1;
        }
        .student-name {
            font-size: 17px; 
            font-weight: 800; 
            color: #2196F3;
            cursor: pointer;
            text-decoration: underline;
        }
        .student-name:hover {
            color: #0b7dda;
        }
        .gender-tag { font-size: 12px; color: #666; background: #e8e8e8; padding: 1px 5px; border-radius: 4px; }
        
        .rate-badge {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #E3F2FD;
            color: var(--accent);
            cursor: pointer;
            font-weight: bold;
        }
        .rate-badge.danger-rate { background: #FFEBEE; color: var(--absent); }

        /* 🚀 新增：未录入红点提醒样式 */
        .unrecorded-alert-badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #FFEBEE;
            color: #D32F2F;
            font-weight: bold;
            border: 1px solid #FFCDD2;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0 { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); }
            70% { box-shadow: 0 0 0 5px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        /* 单钮状态循环切换按钮 */
        .status-cycle-btn {
            width: 75px;
            text-align: center;
            padding: 8px 4px;
            border: 1px solid #ddd;
            background: #f8f9fa;
            color: #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            user-select: none;
        }
        .status-cycle-btn[data-status="normal"] { background: #f8f9fa; color: #444; border-color: #ddd; font-weight: normal; }
        .status-cycle-btn[data-status="leave"] { background: var(--leave); color: black; border-color: var(--leave); }
        .status-cycle-btn[data-status="absent"] { background: var(--absent); color: white; border-color: var(--absent); }
        .status-cycle-btn[data-status="late"] { background: var(--late); color: white; border-color: var(--late); }
        .status-cycle-btn[data-status="early"] { background: var(--early); color: white; border-color: var(--early); }

        .quick-add-form {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            background: #fdfdfd;
        }
        .quick-add-form input[type="text"] { flex: 2; margin: 0; padding: 7px; font-size: 13px; }
        .quick-add-form select { flex: 1; margin: 0; padding: 7px; font-size: 13px; }
        .quick-add-form button { flex: 1; margin: 0; padding: 7px; font-size: 13px; background-color: #009688; }

        .action-block { display: flex; gap: 10px; margin-top: 12px; }
        .backup-btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn-secondary { background-color: #78909C; font-size: 13px; padding: 8px; flex: 1; min-width: 100px; }
        .btn-danger-sys { background-color: #d32f2f; font-size: 13px; padding: 8px; flex: 1; min-width: 100px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-content {
            background: white; padding: 20px 15px; border-radius: 10px; width: 95%; max-width: 440px;
            max-height: 90vh; overflow-y: auto; position: relative; box-sizing: border-box;
        }
        .close-modal { position: absolute; top: 8px; right: 14px; font-size: 24px; cursor: pointer; color: #aaa; user-select: none; z-index: 10100; }
        
        /* 成绩表单微调 */
        .score-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px;}
        .score-row label { font-size: 14px; font-weight: bold; width: 85px; text-align: right; shrink: 0; }
        .score-row input { flex: 1; width: auto; margin: 0; min-width: 60px; }
        .live-score-badge { width: 70px; text-align: center; font-size: 12px; padding: 4px 6px; border-radius: 4px; background: #ffebee; color: #c62828; font-weight: bold; shrink: 0; }
        .live-score-badge.has-val { background: #E8F5E9; color: #2E7D32; }

        /* 🚀 新增：单轨录入总分看板样式 */
        .live-total-score-wrapper {
            background: #E3F2FD;
            border: 1px solid #BBDEFB;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            color: #0D47A1;
        }

        .slider-wrapper { position: relative; margin-top: 10px; }
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0, 0, 0, 0.4); color: white;
            border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10200;
        }
        .nav-arrow.left { left: 4px; }
        .nav-arrow.right { right: 4px; }
        .calendar-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; gap: 15px; padding: 5px 0; }
        .calendar-slider::-webkit-scrollbar { display: none; }
        .month-container { flex: 0 0 100%; scroll-snap-align: start; border: 1px solid #e0e0e0; padding: 12px 10px; border-radius: 8px; background: #fff; box-sizing: border-box; }
        .month-title { text-align: center; font-weight: bold; margin-bottom: 12px; color: #2c3e50; font-size: 15px; }
        .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: #777; font-weight: bold; margin-bottom: 8px; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 12px; background: #fafafa; border: 1px solid #f0f0f0; color: #ccc; }
        .day-cell.pad { background: transparent; border: none; }
        .day-cell.cal-recorded { background: var(--normal) !important; color: white !important; font-weight: bold; } 
        .day-cell.cal-leave { background: var(--leave) !important; color: black !important; font-weight: bold; }
        .day-cell.cal-absent { background: var(--absent) !important; color: white !important; font-weight: bold; }
        .day-cell.cal-late { background: var(--late) !important; color: white !important; font-weight: bold; }
        .day-cell.cal-early { background: var(--early) !important; color: white !important; font-weight: bold; }
        .calendar-legend { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; font-size: 12px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-box { width: 13px; height: 13px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 体育课考勤与成绩管理系统</h2>

    <div class="section">
        <div class="file-input-wrapper" onclick="document.getElementById('excelFile').click()">
            <span id="fileStatus">🟢 导入/追加 Excel</span>
            <input type="file" id="excelFile" accept=".xlsx, .xls" onchange="importExcel(event)">
        </div>
        <p style="font-size: 11px; color:#777; margin: 4px 0 0 0; text-align: center;">表格需包含【班级、姓名、性别】。可包含 50米、立定跳远、坐位体前屈、引体向上、1000米，仰卧起坐、800米。</p>
    </div>

    <div class="section">
        <h3>今日考勤</h3>
        <input type="date" id="datePicker" style="width: 100%; margin-bottom: 10px;">
        <div id="accordionContainer"></div>
    </div>

    <div class="section">
        <button onclick="exportStatsToExcel()" style="background-color: #2E7D32; margin: 0; font-weight: bold; font-size: 16px;">🟢 生成并导出【期末成绩册】 Excel</button>
    </div>

    <div class="section" style="background: #fcfcfc; padding: 10px; border-radius: 6px; border: 1px dashed #bbb;">
        <h4 style="margin: 0; font-size: 13px; color: #555;">🛡️ 系统备份与安全</h4>
        <div class="backup-btn-group">
            <button class="btn-secondary" onclick="exportBackupData()">📥 导出备份</button>
            <button class="btn-secondary" onclick="document.getElementById('importFile').click()" style="background-color: #5c6bc0;">📤 导入备份</button>
            <button class="btn-danger-sys" onclick="systemReset()">🚨 初始化</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBackupData(event)">
        </div>
    </div>
</div>

<div class="modal-overlay" id="calendarModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="document.getElementById('calendarModal').style.display='none'">&times;</span>
        <div id="modalCalendarBody"></div>
    </div>
</div>

    function queryStandardScore(projectName, rawValue, className, gender) {
        if (rawValue === undefined || rawValue === null || String(rawValue).trim() === '') return null;
        
        let val = parseFloat(rawValue);
        if (isNaN(val)) return null;

        let gradeKey = "初一"; 
        ["初一","初二","初三","高一","高二","高三"].forEach(g => { if(className.includes(g)) gradeKey = g; });
        const stdKey = `${gradeKey}${gender}`; 

        let projectType = "";
        if (projectName.includes("50米")) projectType = "run50";
        else if (projectName.includes("跳远")) projectType = "jump";
        else if (projectName.includes("体前屈")) projectType = "sit";
        else if (projectName.includes("仰卧起坐") || projectName.includes("引体向上")) projectType = "str";
        else if (projectName.includes("1000米") || projectName.includes("800米") || projectName.includes("耐力跑")) {
            projectType = "runL";
            if (String(rawValue).includes('.')) {
                let parts = String(rawValue).split('.');
                let mins = parseInt(parts[0], 10) || 0;
                let secs = parseInt(parts[1], 10) || 0;
                val = mins * 60 + secs;
            }
        }

        if (!projectType || !STDS[projectType] || !STDS[projectType][stdKey]) {
            if (val > 100) return 100;
            return val < 0 ? 0 : Math.round(val);
        }

        const ruleList = STDS[projectType][stdKey];

        if (projectType === "run50" || projectType === "runL") {
            if (val <= ruleList[0][0]) return 100;
            if (val > ruleList[ruleList.length - 1][0]) return 0;
            for (let i = 0; i < ruleList.length; i++) {
                if (val <= ruleList[i][0]) return ruleList[i][1];
            }
            return 0;
        } else {
            let actualVal = val;
            if (projectType === "jump" && val < 5) actualVal = Math.round(val * 100);

            if (actualVal >= ruleList[0][0]) return 100;
            if (actualVal < ruleList[ruleList.length - 1][0]) return 0;
            for (let i = 0; i < ruleList.length; i++) {
                if (actualVal >= ruleList[i][0]) return ruleList[i][1];
            }
            return 0;
        }
    }

    function getLevelText(totalScore) {
        if (totalScore >= 90) return "优秀";

    }

    let cachedStats = {};
    function calculateAllStats() {
        const classNames = Object.keys(students);
        const classTotalDays = {};
        cachedStats = {};
        
        classNames.forEach(c => {
            classTotalDays[c] = 0; cachedStats[c] = {};
            students[c].forEach(s => { cachedStats[c][s.name] = { leave: 0, absent: 0, late: 0, early: 0 }; });
        });

        for (let date in records) {
            const dateData = records[date];
            classNames.forEach(className => {
                if (dateData[className]) {
                    classTotalDays[className]++;
                    students[className].forEach(studentObj => {
                        const sName = studentObj.name;
                        const status = dateData[className][sName] || 'normal';
                        if (cachedStats[className] && cachedStats[className][sName] && status !== 'normal') {
                            cachedStats[className][sName][status]++;
                        }
                    });
                }
            });
        }
        return classTotalDays;
    }

    function importExcel(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('fileStatus').innerText = "正在智能追加解析...";
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                if (json.length === 0) { alert('Excel内容为空！'); return; }
                
                const firstRow = json[0];
                if (!('班级' in firstRow) || !('姓名' in firstRow)) {
                    alert('导入失败！Excel表头必须包含“班级”和“姓名”！');
                    return;
                }

                const keys = Object.keys(firstRow);
                const projectKeys = keys.filter(k => k !== '班级' && k !== '姓名' && k !== '性别' && k !== '__rowNum__');

                let addStuCount = 0;
                let updateScoreCount = 0;

                json.forEach(row => {
                    const cls = String(row['班级']).trim();
                    const name = String(row['姓名']).trim();
                    const gender = row['性别'] ? String(row['性别']).trim() : '男';

                    if (!cls || !name) return;
                    if (!students[cls]) students[cls] = [];

                    let studentObj = students[cls].find(s => s.name === name);
                    if (!studentObj) {
                        studentObj = { name: name, gender: gender, scores: {} };
                        students[cls].push(studentObj);
                        addStuCount++;
                    }

                    projectKeys.forEach(proj => {
                        if (row[proj] !== undefined && row[proj] !== null && String(row[proj]).trim() !== '') {
                            studentObj.scores[proj] = String(row[proj]).trim();
                            updateScoreCount++;
                        }
                    });
                });

                localStorage.setItem('pe_v6_students', JSON.stringify(students));
                alert(`🎉 数据并轨完成！\n新增登记：${addStuCount} 人\n识别并追加更新项目成绩：${updateScoreCount} 项次`);
                document.getElementById('fileStatus').innerText = "🟢 导入/追加 Excel";
                renderAccordion();
            } catch (err) {
                alert('解析失败：' + err);
            }
        };
        reader.readAsBinaryString(file);
    }

    function quickAddStudent(className) {
        const nameInput = document.getElementById(`add-name-${className}`);
        const genderSelect = document.getElementById(`add-gender-${className}`);
        const name = nameInput.value.trim();
        const gender = genderSelect.value;

        if (!name) { alert('请输入姓名！'); return; }
        if (students[className].some(s => s.name === name)) { alert(`学生已存在！`); return; }

        students[className].push({ name: name, gender: gender, scores: {} });
        localStorage.setItem('pe_v6_students', JSON.stringify(students));
        
        nameInput.value = '';
        showToast(`已追加：${name}`);
        renderAccordion();
    }

    function renderAccordion() {
        const container = document.getElementById('accordionContainer');
        container.innerHTML = '';
        const currentDate = document.getElementById('datePicker').value;
        const dateRecord = records[currentDate] || {};
        const classNames = Object.keys(students);

        if (classNames.length === 0) {
            container.innerHTML = '<p style="color:#999; text-align:center; font-size:14px; padding:10px;">暂无班级名册，请点上方按钮导入 Excel 文件。</p>';
            return;
        }

        const classTotalDays = calculateAllStats();

        classNames.forEach(className => {
            const classGroup = document.createElement('div');
            classGroup.className = 'class-group';
            classGroup.id = `group-${className}`;
            
            if (openedClassesState[className]) {
                classGroup.classList.add('open');
            }

            const totalClasses = classTotalDays[className] || 0;

            const header = document.createElement('div');
            header.className = 'class-header';
            header.innerText = `${className} (${students[className].length}人 / 累积上课${totalClasses}节)`;
            header.onclick = () => toggleClass(classGroup, className);

            const content = document.createElement('div');
            content.className = 'class-content';
            const classTodayRecord = dateRecord[className] || {};

           
            let activeClassProjs = new Set();
            students[className].forEach(s => {
                if(s.scores) {
                    Object.keys(s.scores).forEach(p => {
                        if(s.scores[p] !== undefined && s.scores[p] !== null && String(s.scores[p]).trim() !== '') {
                            activeClassProjs.add(p);
                        }
                    });
                }
            });

            students[className].forEach((studentObj, index) => {
                const sName = studentObj.name;
                const sGender = studentObj.gender;
                const currentStatus = classTodayRecord[sName] || 'normal'; 
                
                const s = cachedStats[className][sName] || { leave: 0, absent: 0, late: 0, early: 0 };
                const totalMissedScore = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
                let effectiveAttendance = totalClasses - totalMissedScore;
                if (effectiveAttendance < 0) effectiveAttendance = 0;
                const rate = totalClasses > 0 ? ((effectiveAttendance / totalClasses) * 100).toFixed(0) : 100;
                const isDanger = parseFloat(rate) < 85;

                // 🚀 核心升级：判断该生在已开展项目中是否缺失专属成绩
                let isUnrecorded = false;
                let missingProjectNames = [];
                activeClassProjs.forEach(proj => {
                    // 性别专属项屏障过滤
                    if (sGender === '男' && (proj.includes("800米") || proj.includes("仰卧起坐"))) return;
                    if (sGender === '女' && (proj.includes("1000米") || proj.includes("引体向上"))) return;

                    // 若已开考科目为空，判定为未录
                    if (!studentObj.scores || studentObj.scores[proj] === undefined || studentObj.scores[proj] === null || String(studentObj.scores[proj]).trim() === '') {
                        isUnrecorded = true;
                        missingProjectNames.push(proj);
                    }
                });

                let alertBadgeHtml = isUnrecorded ? `<span class="unrecorded-alert-badge" title="未录科目: ${missingProjectNames.join('、')}">● 未录</span>` : '';

                const item = document.createElement('div');
                item.className = 'student-item';
                item.innerHTML = `
                    <div class="student-info">
                        <span style="color:#aaa; font-size:12px;">${index + 1}</span>
                        <span class="student-name" onclick="openScoreModal('${className}', '${sName}')" title="点击录入/修改成绩">${sName}</span>
                        <span class="gender-tag">${sGender}</span>
                        <span class="rate-badge ${isDanger ? 'danger-rate' : ''}" onclick="event.stopPropagation(); showStudentCalendar('${className}', '${sName}')">出勤:${rate}%</span>
                        ${alertBadgeHtml}
                        <span class="btn-del-student" onclick="deleteStudent('${className}', '${sName}')" title="彻底删除">🗑️</span>
                    </div>
                    <button class="status-cycle-btn" 
                            data-class="${className}" 
                            data-student="${sName}" 
                            data-status="${currentStatus}" 
                            onclick="cycleStatus(this)">
                        ${statusTextMap[currentStatus]}
                    </button>
                `;
                content.appendChild(item);
            });

            const quickAddDiv = document.createElement('div');
            quickAddDiv.className = 'quick-add-form';
            quickAddDiv.innerHTML = `
                <span style="font-size:16px; margin: 0 4px; color:#009688; font-weight:bold;">➕</span>
                <input type="text" id="add-name-${className}" placeholder="追加学生姓名" onclick="event.stopPropagation()">
                <select id="add-gender-${className}" onclick="event.stopPropagation()">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
                <button onclick="event.stopPropagation(); quickAddStudent('${className}')">添加</button>
            `;
            content.appendChild(quickAddDiv);

            const actionBlock = document.createElement('div');
            actionBlock.className = 'action-block';
            actionBlock.innerHTML = `
                <button onclick="submitClassAttendance('${className}')" style="background-color: var(--accent); flex: 3; margin:0;">确认并提交 ${className} 考勤</button>
                <button onclick="deleteClass('${className}')" style="background-color: #90A4AE; flex: 1; margin:0; font-size:13px;">🗑️ 删班</button>
            `;
            content.appendChild(actionBlock);

            classGroup.appendChild(header);
            classGroup.appendChild(content);
            container.appendChild(classGroup);
        });
    }

            let badgeCls = initialScore !== null && initialScore > 0 ? 'has-val' : '';

            fieldsHtml += `
                <div class="score-row">
                    <label>${proj}:</label>
                    <input type="text" id="modal-score-${proj}" class="student-score-field" 
                           inputmode="decimal"
                           data-proj="${proj}" value="${val}" placeholder="未录入"
                           oninput="updateLiveScore(this, '${className}', '${gender}')">
                    <div class="live-score-badge ${badgeCls}" id="live-badge-${proj}">${displayScore}分</div>
                </div>
            `;
        });

        modalBody.innerHTML = `
            <h3 style="margin-top:5px; text-align:center;">🏆 个人成绩单轨录入</h3>
            <p style="text-align:center; font-size:14px; margin-bottom:10px;">学生：<b>${studentName}</b> (${className} / <span style="color:#e91e63;font-weight:bold;">${gender}</span>)</p>
            
            <div class="live-total-score-wrapper">
                <span style="font-size: 14px; font-weight: 500;">期末总分：</span>
                <b id="modalLiveTotalScore" style="font-size: 22px;">--</b>
                <span id="modalLiveTotalLevel" style="font-size: 13px; font-weight: bold; margin-left:6px; background:#fff; padding:2px 6px; border-radius:4px;">--</span>
                <p style="margin: 4px 0 0 0; font-size: 11px; color: #666;">(计算公式：项目平均分×80% + 考勤分×20%)</p>
            </div>

            <div id="modalScoreFieldsContainer" style="max-height:240px; overflow-y:auto; padding-right:5px; border-bottom:1px dashed #eee; margin-bottom:10px;">
                ${fieldsHtml}
            </div>

            <div class="quick-add-form" style="border-bottom:none; padding: 5px 0 15px 0;">
                <input type="text" id="newProjNameInput" placeholder="自定义附加测试科目(仅记录)" style="flex:2;">
                <button onclick="addNewScoreFieldIntoModal('${className}', '${gender}')" style="flex:1; margin:0; background:#009688; padding:8px;">+ 科目</button>
            </div>

            <button onclick="saveStudentSingleScores('${className}', '${studentName}')" style="background-color: #2E7D32; font-weight: bold; margin-top:5px;">💾 保存并更新</button>
        `;

        document.getElementById('calendarModal').style.display = 'flex';
        
        // 打开时，首次触发实时总分计算
        refreshModalTotalScore(className, gender);
    }

    function updateLiveScore(inputElem, className, gender) {
        const proj = inputElem.getAttribute('data-proj');
        const val = inputElem.value.trim();
        const badge = document.getElementById(`live-badge-${proj}`);
        
        const calculated = queryStandardScore(proj, val, className, gender);
        let displayScore = calculated !== null ? calculated : 0;
        badge.innerText = `${displayScore}分`;
        if (displayScore > 0) {
            badge.classList.add('has-val');
        } else {
            badge.classList.remove('has-val');
        }

        refreshModalTotalScore(className, gender);
    }

    
    function refreshModalTotalScore(className, gender) {
        const fields = document.querySelectorAll('.student-score-field');
        

        let activeClassProjs = new Set();
        if (students[className]) {
            students[className].forEach(s => {
                if (s.scores) {
                    Object.keys(s.scores).forEach(p => {
                        let val = s.scores[p];
                        if (val !== undefined && val !== null && String(val).trim() !== '') {
                            // 过滤性别专属项干扰
                            if (gender === '男' && (p.includes("800米") || p.includes("仰卧起坐"))) return;
                            if (gender === '女' && (p.includes("1000米") || p.includes("引体向上"))) return;
                            activeClassProjs.add(p);
                        }
                    });
                }
            });
        }

        let validProjectsSum = 0;
   
        let validProjectsCount = activeClassProjs.size; 

        fields.forEach(f => {
            const proj = f.getAttribute('data-proj');
            const val = f.value.trim();

            if (activeClassProjs.has(proj)) {
                const calculatedPoints = queryStandardScore(proj, val, className, gender);
                if (calculatedPoints !== null) {
                    validProjectsSum += calculatedPoints;
                } else {
                    validProjectsSum += 0; // 该同学未录入此项（缺考），计 0 分
                }
            }
        });

        // 2. 提取考勤扣分逻辑
        const studentName = document.querySelector('#modalCalendarBody b').innerText;
        const classTotalDays = calculateAllStats();
        const totalClasses = classTotalDays[className] || 0;
        
        const s = cachedStats[className][studentName] || { leave: 0, absent: 0, late: 0, early: 0 };
        const totalMissedScore = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
        let effectiveAttendance = totalClasses - totalMissedScore;
        if (effectiveAttendance < 0) effectiveAttendance = 0;
        const attendanceRateNum = totalClasses > 0 ? (effectiveAttendance / totalClasses) : 1.0;
        const attendanceFinalScore = Math.round(attendanceRateNum * 100);

        // 3. 汇算最终成绩：如果班级还没开始任何考试，分母为 0 时平均分按 0 算
        let sportsAverageScore = validProjectsCount > 0 ? (validProjectsSum / validProjectsCount) : 0;
        let finalTotalScore = Math.round((sportsAverageScore * 0.8) + (attendanceFinalScore * 0.2));

        // 4. 更新看板渲染
        document.getElementById('modalLiveTotalScore').innerText = `${finalTotalScore} 分`;
        const levelText = getLevelText(finalTotalScore);
        const lvlBadge = document.getElementById('modalLiveTotalLevel');
        lvlBadge.innerText = levelText;

        // 根据等级微调小标签颜色
        if(levelText === "优秀") { lvlBadge.style.color = "#2E7D32"; }
        else if(levelText === "良好") { lvlBadge.style.color = "#1565C0"; }
        else if(levelText === "及格") { lvlBadge.style.color = "#EF6C00"; }
        else { lvlBadge.style.color = "#C62828"; }
    }

    function addNewScoreFieldIntoModal(className, gender) {
        const input = document.getElementById('newProjNameInput');
        const projName = input.value.trim();
        if(!projName) { alert('请输入科目名称！'); return; }
        
        if (gender === '男' && (projName.includes("800米") || projName.includes("仰卧起坐"))) { alert('男生无需添加此科目！'); return; }
        if (gender === '女' && (projName.includes("1000米") || projName.includes("引体向上"))) { alert('女生无需添加此科目！'); return; }

        if(document.getElementById(`modal-score-${projName}`)) { alert('该项目输入框已存在'); return; }

        const container = document.getElementById('modalScoreFieldsContainer');
        const div = document.createElement('div');
        div.className = 'score-row';
        div.innerHTML = `
            <label>${projName}:</label>
            <input type="text" id="modal-score-${projName}" class="student-score-field" 
                   inputmode="decimal"
                   data-proj="${projName}" value="" placeholder="手动录入值"
                   oninput="updateLiveScore(this, '${className}', '${gender}')">
            <div class="live-score-badge" id="live-badge-${projName}">0分</div>
        `;
        container.appendChild(div);
        input.value = '';
        container.scrollTop = container.scrollHeight;

        // 联动刷新
        refreshModalTotalScore(className, gender);
    }

    function saveStudentSingleScores(className, studentName) {
        const studentObj = students[className].find(s => s.name === studentName);
        if(!studentObj) return;

        if(!studentObj.scores) studentObj.scores = {};
        
        const fields = document.querySelectorAll('.student-score-field');
        fields.forEach(f => {
            const proj = f.getAttribute('data-proj');
            const val = f.value.trim();
            if(val === '') {
                delete studentObj.scores[proj];
            } else {
                studentObj.scores[proj] = val;
            }
        });

        localStorage.setItem('pe_v6_students', JSON.stringify(students));
        document.getElementById('calendarModal').style.display = 'none';
        showToast(`已成功同步 ${studentName} 的个人期末成绩`);
        renderAccordion(); // 重新渲染，依然保持原展开状态，红点自动计算刷新
    }

    function cycleStatus(btn) {
        const currentStatus = btn.getAttribute('data-status') || 'normal';
        let currentIndex = statusSequence.indexOf(currentStatus);
        let nextIndex = (currentIndex + 1) % statusSequence.length;
        const nextStatus = statusSequence[nextIndex];
        btn.setAttribute('data-status', nextStatus);
        btn.innerText = statusTextMap[nextStatus];
    }

    function deleteStudent(className, studentName) {
        event.stopPropagation();
        if (confirm(`确定要彻底删除学生【${studentName}】吗？`)) {
            students[className] = students[className].filter(s => s.name !== studentName);
            localStorage.setItem('pe_v6_students', JSON.stringify(students));
            renderAccordion();
        }
    }

    function deleteClass(className) {
        if (confirm(`⚠️ 确定要清空删除【${className}】吗？`)) {
            delete students[className];
            localStorage.setItem('pe_v6_students', JSON.stringify(students));
            renderAccordion();
        }
    }

    function toggleClass(classGroup, className) { 
        classGroup.classList.toggle('open'); 
        if (classGroup.classList.contains('open')) {
            openedClassesState[className] = true;
        } else {
            delete openedClassesState[className];
        }
        localStorage.setItem('pe_v6_open_state', JSON.stringify(openedClassesState));
    }

    document.getElementById('datePicker').addEventListener('change', renderAccordion);

    function submitClassAttendance(className) {
        const date = document.getElementById('datePicker').value;
        if (!date) return;
        if (!records[date]) records[date] = {};
        if (!records[date][className]) records[date][className] = {};

        const cycleButtons = document.querySelectorAll(`.status-cycle-btn[data-class="${className}"]`);
        cycleButtons.forEach(btn => {
            const student = btn.getAttribute('data-student');
            const status = btn.getAttribute('data-status') || 'normal';
            records[date][className][student] = status;
        });

        localStorage.setItem('pe_v6_records', JSON.stringify(records));
        showToast(`已提交 ${className} 考勤并实时归档`);
        renderAccordion();
    }

    function exportStatsToExcel() {
        const classNames = Object.keys(students);
        if (classNames.length === 0) { alert('暂无班级数据'); return; }

        const classTotalDays = calculateAllStats();

        let baseProjects = ["50米", "立定跳远", "坐位体前屈", "1000米", "800米", "仰卧起坐", "引体向上"];
        let activeProjectsList = [];

        baseProjects.forEach(proj => {
            let hasAnyData = false;
            classNames.forEach(c => {
                students[c].forEach(s => {
                    if (s.scores && s.scores[proj] !== undefined && s.scores[proj] !== null && String(s.scores[proj]).trim() !== '') {
                        hasAnyData = true;
                    }
                });
            });
            if (hasAnyData) activeProjectsList.push(proj);
        });

        let row1 = ["序号", "班级", "姓名", "性别"];
        let row2 = ["", "", "", ""];

        activeProjectsList.forEach(proj => {
            row1.push(proj, "");  
            row2.push("成绩", "得分");
        });

        row1.push("考勤分", "总分", "等级");
        row2.push("", "", "");

        let dataRows = [row1, row2];

        let columnWidths = [ {wch: 4.5}, {wch: 6}, {wch: 8.5}, {wch: 4.5} ];
        
        activeProjectsList.forEach(() => {
            columnWidths.push({wch: 5.5}, {wch: 5.5});
        });

        columnWidths.push({wch: 6}, {wch: 4.5}, {wch: 6});

        classNames.forEach(className => {
            const totalClasses = classTotalDays[className] || 0;

            students[className].forEach((studentObj, index) => {
                const sName = studentObj.name;
                const sGender = studentObj.gender;
                const sScores = studentObj.scores || {};

                let rowCells = [index + 1, className, sName, sGender];
                let validProjectsSum = 0;
                let validProjectsCount = 0;

                activeProjectsList.forEach(proj => {
                    if (sGender === '男' && (proj.includes("800米") || proj.includes("仰卧起坐"))) {
                        rowCells.push("/", "/");
                        return;
                    }
                    if (sGender === '女' && (proj.includes("1000米") || proj.includes("引体向上"))) {
                        rowCells.push("/", "/");
                        return;
                    }

                    const rawValue = sScores[proj];
                    const calculatedPoints = queryStandardScore(proj, rawValue, className, sGender);
                    
                    if (calculatedPoints !== null) {
                        rowCells.push(rawValue, calculatedPoints);
                        validProjectsSum += calculatedPoints;
                    } else {
                        rowCells.push("-", 0);
                        validProjectsSum += 0;
                    }
                    validProjectsCount++;
                });

                const s = cachedStats[className][sName] || { leave: 0, absent: 0, late: 0, early: 0 };
                const totalMissedScore = (s.absent * 1.0) + (s.leave * 0.5) + (s.late * 0.25) + (s.early * 0.25);
                let effectiveAttendance = totalClasses - totalMissedScore;
                if (effectiveAttendance < 0) effectiveAttendance = 0;
                const attendanceRateNum = totalClasses > 0 ? (effectiveAttendance / totalClasses) : 1.0;
                const attendanceFinalScore = Math.round(attendanceRateNum * 100);

                let sportsAverageScore = validProjectsCount > 0 ? (validProjectsSum / validProjectsCount) : 0;
                let finalTotalScore = Math.round((sportsAverageScore * 0.8) + (attendanceFinalScore * 0.2));

                rowCells.push(
                    attendanceFinalScore, 
                    finalTotalScore, 
                    getLevelText(finalTotalScore)
                );

                dataRows.push(rowCells);
            });
        });

        const ws = XLSX.utils.aoa_to_sheet(dataRows);
        
        const range = XLSX.utils.decode_range(ws['!ref']);
        for (let R = range.s.r; R <= range.e.r; ++R) {
            for (let C = range.s.c; C <= range.e.c; ++C) {
                const cell_address = { c: C, r: R };
                const cell_ref = XLSX.utils.encode_cell(cell_address);
                if (!ws[cell_ref]) continue;
                if (!ws[cell_ref].s) ws[cell_ref].s = {};
                ws[cell_ref].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
            }
        }

        const merges = [];
        for(let i=0; i<4; i++) {
            merges.push({ s: { r: 0, c: i }, e: { r: 1, c: i } });
        }
        let startCol = 4;
        activeProjectsList.forEach(() => {
            merges.push({ s: { r: 0, c: startCol }, e: { r: 0, c: startCol + 1 } });
            startCol += 2;
        });
        for(let i=0; i<3; i++) {
            merges.push({ s: { r: 0, c: startCol + i }, e: { r: 1, c: startCol + i } });
        }

        ws['!merges'] = merges;
        ws['!cols'] = columnWidths; 

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "期末体育成绩册");
        const dateStr = new Date().toISOString().slice(0, 10);
        XLSX.writeFile(wb, `体育期末成绩册_${dateStr}.xlsx`);
    }

    function showStudentCalendar(className, studentName) {
        event.stopPropagation(); 
        let allDates = Object.keys(records).filter(date => records[date][className]);
        if (allDates.length === 0) { alert("暂无打卡日志"); return; }
        allDates.sort();
        let uniqueMonths = [...new Set(allDates.map(d => d.substring(0, 7)))].sort();
        let modalBody = document.getElementById('modalCalendarBody');
        
        modalBody.innerHTML = `
            <h3 style="margin-top:5px; text-align:center;">📅 考勤轨迹细则</h3>
            <p style="text-align:center; font-size:14px;">学生：<b>${studentName}</b> (${className})</p>
            <div class="calendar-legend">
                <div class="legend-item"><div class="legend-box" style="background:var(--normal);"></div>正常</div>
                <div class="legend-item"><div class="legend-box" style="background:var(--leave)"></div>请假</div>
                <div class="legend-item"><div class="legend-box" style="background:var(--absent)"></div>旷课</div>
                <div class="legend-item"><div class="legend-box" style="background:var(--late)"></div>迟到</div>
                <div class="legend-item"><div class="legend-box" style="background:var(--early)"></div>早退</div>
            </div>
            <div class="slider-wrapper">
                <button class="nav-arrow left" onclick="scrollCalendarContainer(-1)">◀</button>
                <div class="calendar-slider" id="calendarSlider"></div>
                <button class="nav-arrow right" onclick="scrollCalendarContainer(1)">▶</button>
            </div>
        `;
        let sliderContainer = document.getElementById('calendarSlider');
        uniqueMonths.forEach(ym => {
            let [year, month] = ym.split('-').map(Number);
            let firstDayIndex = new Date(year, month - 1, 1).getDay();
            let daysInMonth = new Date(year, month, 0).getDate();
            let monthHtml = `<div class="month-container"><div class="month-title">📍 ${year}年${month}月</div><div class="calendar-weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div><div class="calendar-days">`;
            for (let i = 0; i < firstDayIndex; i++) monthHtml += `<div class="day-cell pad"></div>`;
            for (let day = 1; day <= daysInMonth; day++) {
                let dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                let status = (records[dateStr] && records[dateStr][className]) ? (records[dateStr][className][studentName] || 'normal') : 'none';
                let cls = '';
                if (status === 'normal') cls = 'cal-recorded';
                else if (status === 'leave') cls = 'cal-leave';
                else if (status === 'absent') cls = 'cal-absent';
                else if (status === 'late') cls = 'cal-late';
                else if (status === 'early') cls = 'cal-early';
                monthHtml += `<div class="day-cell ${cls}"><span>${day}</span></div>`;
            }
            monthHtml += `</div></div>`; sliderContainer.innerHTML += monthHtml;
        });
        document.getElementById('calendarModal').style.display = 'flex';
        setTimeout(() => { sliderContainer.scrollLeft = sliderContainer.scrollWidth; }, 60);
    }

    function scrollCalendarContainer(dir) { const s = document.getElementById('calendarSlider'); if (s) s.scrollBy({ left: dir * s.clientWidth, behavior: 'smooth' }); }
    function closeModal(e) { if(e.target.id === 'calendarModal') document.getElementById('calendarModal').style.display = 'none'; }
    function exportBackupData() {
        const d = JSON.stringify({ students: students, records: records });
        const blob = new Blob([d], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = `系统全量备份_${new Date().toISOString().slice(0, 10)}.json`; a.click();
    }
    function importBackupData(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const backData = JSON.parse(evt.target.result);
                if (backData.students) {
                    students = backData.students; records = backData.records || {};
                    localStorage.setItem('pe_v6_students', JSON.stringify(students));
                    localStorage.setItem('pe_v6_records', JSON.stringify(records));
                    alert("🎉 考勤及成绩恢复成功！"); renderAccordion();
                }
            } catch(err) { alert("文件解析失败"); }
        };
        reader.readAsText(file);
    }
    function systemReset() {
        if (prompt("数据清空请输入 admin:") === "admin" && confirm("确定清空系统数据吗？")) {
            localStorage.removeItem('pe_v6_students'); localStorage.removeItem('pe_v6_records');
            localStorage.removeItem('pe_v6_open_state');
            students = {}; records = {}; location.reload();
        }
    }
    function showToast(msg) {
        const tip = document.createElement('div');
        tip.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:8px 16px; border-radius:20px; font-size:13px; z-index:9999;";
        tip.innerText = msg; document.body.appendChild(tip); setTimeout(() => tip.remove(), 1200);
    }
</script>
</body>
